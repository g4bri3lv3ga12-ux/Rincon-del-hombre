version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: rincon_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: rincon
    volumes:
      - mongodb_data:/data/db
    networks:
      - rincon_network

  app:
    build: .
    container_name: rincon_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mongodb://admin:admin123@mongodb:27017/rincon?authSource=admin"
      NEXTAUTH_SECRET: "your-secret-key-change-this-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
      JWT_SECRET: "your-jwt-secret-change-this-in-production"
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - rincon_network

volumes:
  mongodb_data:

networks:
  rincon_network:
    driver: bridge
